<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Gestion Bar Galacumba</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="loginPage" class="page">
    <h1>Gestion Bar Galacumba</h1>

    <input id="username" placeholder="Identifiant">
    <input id="password" type="password" placeholder="Mot de passe">

    <button onclick="login()">Connexion</button>
</div>

<div id="homePage" class="page hidden">
    <h1>Accueil</h1>

    <button onclick="nouveauRapport()">Créer un rapport</button>
    <button onclick="voirRapports()">Voir les rapports</button>
</div>

<div id="createPage" class="page hidden">

    <button onclick="accueil()">🏠 Accueil</button>

    <h2>Rapport</h2>

    <input id="nom" placeholder="Nom et prénom">
    <input id="date" placeholder="JJ/MM/AAAA">

    <h3>Ventes</h3>

    <div id="ventes"></div>

    <h3>Entrées</h3>

    <button onclick="modifierEntrees(-1)">-</button>
    <span id="nbEntrees">0</span>
    <button onclick="modifierEntrees(1)">+</button>

    <h3>Classement</h3>

    <ol id="classement">
        <li>-</li>
        <li>-</li>
        <li>-</li>
    </ol>

    <button onclick="enregistrerRapport()">Enregistrer</button>
</div>

<div id="reportsPage" class="page hidden">

    <button onclick="accueil()">🏠 Accueil</button>

    <h2>Rapports</h2>

    <div id="listeRapports"></div>
</div>

<div id="consultPage" class="page hidden">

    <button onclick="voirRapports()">⬅ Retour</button>

    <div id="contenuRapport"></div>

</div>

<script src="script.js"></script>

</body>
</html>
